name: build

on:
  workflow_dispatch:
  push:

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build:mac:arm
      - run: npm run build:mac:intel
      - uses: actions/upload-artifact@v4
        with:
          name: api-olx-mac
          path: dist/*
